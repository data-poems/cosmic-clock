        const DEG = Math.PI / 180;
        function norm(a) { return ((a % 360) + 360) % 360; }

        function julianDate(date) {
            const y = date.getUTCFullYear(), m = date.getUTCMonth() + 1;
            const d = date.getUTCDate() + date.getUTCHours()/24 + date.getUTCMinutes()/1440 + date.getUTCSeconds()/86400;
            const a = Math.floor((14 - m) / 12);
            const yy = y + 4800 - a, mm = m + 12 * a - 3;
            return d + Math.floor((153*mm + 2)/5) + 365*yy + Math.floor(yy/4) - Math.floor(yy/100) + Math.floor(yy/400) - 32045;
        }

        function solarLongitude(jd) {
            const T = (jd - 2451545.0) / 36525;
            const L0 = norm(280.46646 + 36000.76983*T + 0.0003032*T*T);
            const M = norm(357.52911 + 35999.05029*T - 0.0001537*T*T);
            const Mrad = M * DEG;
            const C = (1.914602 - 0.004817*T)*Math.sin(Mrad) + 0.019993*Math.sin(2*Mrad) + 0.000289*Math.sin(3*Mrad);
            return norm(L0 + C);
        }

            if (cachedThemeName === currentTheme) return cachedThemeConfig;
            const overrides = themeConfigs[currentTheme] || {};

            if (overrides.ringColors) {
                cachedThemeConfig.ringColors = { ...defaultThemeConfig.ringColors, ...overrides.ringColors };

            if (!overrides.textDim && cachedThemeConfig.textColor !== defaultThemeConfig.textColor) {
                const rgb = hexToRgb(cachedThemeConfig.textColor);
                cachedThemeConfig.textDim = `rgba(${rgb.r},${rgb.g},${rgb.b},0.6)`;
            }
            cachedThemeName = currentTheme;
            return cachedThemeConfig;
        }

        function setThemeClass(themeName) {
            document.body.classList.remove(...[...document.body.classList].filter(c => c.startsWith('theme-')));
            document.body.classList.add(themeName);

            if (saved && themeConfigs[saved] !== undefined) {
                currentTheme = saved;
                setThemeClass(saved);

            if (phase < 0) phase += 1;

        function getRingValue(ring, now, minProgress, hrProgress, yearProgress, dayOfYear) {
            if (ring.id === 'min') return minProgress / 60;
            if (ring.id === 'hr') return hrProgress / 24;
            if (ring.id === 'wday') return (now.getDay() + hrProgress / 24) / 7;
            if (ring.id === 'day') return (now.getDate() - 1 + hrProgress / 24) / 31;
            if (ring.id === 'month') return (now.getMonth() + (now.getDate() - 1) / 31) / 12;
            if (ring.id === 'week') {
                const weekOfYear = Math.ceil(dayOfYear / 7);
                return (weekOfYear - 1 + (now.getDay() + hrProgress / 24) / 7) / 52;
            }
            if (['lunar', 'zodiac', 'events', 'seasons', 'daylight', 'showers', 'planets'].includes(ring.type)) return yearProgress;
            return 0;

            if (['min', 'hr'].includes(ring.id)) return theme.ringColors.time;
            if (['wday', 'day', 'month'].includes(ring.id)) return theme.ringColors.calendar;
            if (ring.type === 'lunar' || ring.type === 'zodiac') return theme.ringColors.celestial;
            if (ring.type === 'events') return theme.ringColors.events;
            if (ring.type === 'seasons') return theme.ringColors.seasons;
            if (ring.type === 'daylight') return theme.ringColors.daylight;
            if (ring.type === 'showers') return theme.ringColors.celestial;
            if (ring.type === 'planets') return theme.ringColors.celestial;

        // Draw ring with theme-specific style
        function drawThemedRing(r, w, color, progress, theme, isHovered) {
            const style = theme.ringStyle;

            // Background ring (track)
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, TAU);
            ctx.strokeStyle = color;
            ctx.globalAlpha = isHovered ? theme.ringOpacity * 2.5 : theme.ringOpacity;
            ctx.lineWidth = w;

            if (style === 'neumorphic' || style === 'neumorphic-dark') {
                // Draw inset shadow effect for neumorphism
                ctx.shadowBlur = 8;
                ctx.shadowColor = theme.neuDarkShadow;
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 3;
                ctx.stroke();
                ctx.shadowOffsetX = -3;
                ctx.shadowOffsetY = -3;
                ctx.shadowColor = theme.neuLightShadow;
                ctx.stroke();
                resetShadow();
            } else if (style === 'cockpit') {
                // Retro CRT/cockpit gauge style with scanline effect
                ctx.stroke();
                // Add subtle glow around the ring
                ctx.shadowBlur = 6;
                ctx.shadowColor = color;
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, TAU);
                ctx.strokeStyle = color;
                ctx.globalAlpha = 0.15;
                ctx.lineWidth = w + 4;
                ctx.stroke();
                resetShadow();
                ctx.globalAlpha = 1.0;
            } else if (style === 'beveled') {
                // Skeuomorphic beveled edge
                ctx.stroke();
                ctx.globalAlpha = 1;
                // Inner bevel (light)
                ctx.beginPath();
                ctx.arc(0, 0, r - w/2 + 1, 0, TAU);
                ctx.strokeStyle = theme.bezelLight;
                ctx.lineWidth = 1;
                ctx.stroke();
                // Outer bevel (dark)
                ctx.beginPath();
                ctx.arc(0, 0, r + w/2 - 1, 0, TAU);
                ctx.strokeStyle = theme.bezelDark;
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.stroke();

            if (progress > 0 && progress <= 1) {
                ctx.beginPath();
                const startA = -HALF_PI;
                const endA = startA + (progress * TAU);
                ctx.arc(0, 0, r, startA, endA);
                ctx.strokeStyle = color;
                ctx.globalAlpha = theme.activeOpacity;
                ctx.lineWidth = w;

                if (style === 'glow' && theme.glowEnabled) {
                    ctx.shadowBlur = theme.shadowBlur;
                    ctx.shadowColor = color;

                if (style === 'aurora') {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = color;
                    ctx.lineWidth = w + 2;
                }
                if (style === 'bold') {
                    ctx.lineWidth = w + 4;
                }

                ctx.stroke();
                resetShadow();
                ctx.globalAlpha = 1.0;
            }

                        // Draw star dots
                        sign.stars.forEach((star) => {
                            ctx.beginPath();
                            const sx = (star[0] - 0.5) * s;
                            const sy = (star[1] - 0.5) * s;
                            ctx.arc(sx, sy, isActiveSign ? 2 : 1.5, 0, TAU);
                            ctx.fillStyle = isActiveSign ? theme.textColor : theme.textDim;
                            ctx.fill();
                        });

                        ctx.restore();
                    });
                }

                if (ring.type === 'events') {
                    allEvents.forEach(ev => {
                        const doy = (ev.date - YEAR_BASE) / MS_PER_DAY;
                        const a = (doy / DAYS_IN_YEAR) * TAU - HALF_PI;
                        const isToday = ev.date.toDateString() === now.toDateString();
                        const eventColor = eventColors[ev.type] || getRingColor(ring, theme);

                        ctx.beginPath();
                        ctx.arc(Math.cos(a)*r, Math.sin(a)*r, isToday ? 6 : 4, 0, TAU);
                        ctx.fillStyle = isToday ? theme.textColor : eventColor;
                        if (isToday && theme.glowEnabled) {
                            ctx.shadowBlur = 12;
                            ctx.shadowColor = eventColor;
                        }
                        ctx.fill();
                        resetShadow();
                    });
                }

                if (ring.type === 'seasons') {
                    seasonData.forEach(season => {
                        const startA = (season.start / DAYS_IN_YEAR) * TAU - HALF_PI;
                        const endA = (season.end / DAYS_IN_YEAR) * TAU - HALF_PI;
                        const isActive = dayOfYear >= season.start && dayOfYear < season.end;

                        ctx.beginPath();
                        ctx.arc(0, 0, r, startA, endA);
                        ctx.strokeStyle = season.color;
                        ctx.globalAlpha = isActive ? 0.8 : 0.25;
                        ctx.lineWidth = w;
                        ctx.stroke();

                        if (isActive) {
                            const midA = (startA + endA) / 2;
                            ctx.save();
                            ctx.translate(Math.cos(midA) * r, Math.sin(midA) * r);
                            ctx.rotate(midA + HALF_PI);
                            ctx.fillStyle = theme.textColor;
                            ctx.font = '400 11px Montserrat';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.globalAlpha = 1;
                            ctx.fillText(season.name.toUpperCase(), 0, 0);
                            ctx.restore();
                        }
                    });
                    ctx.globalAlpha = 1.0;
                }

                if (ring.type === 'daylight') {
                    const amplitude = 2.7;
                    const segments = 180;
                    for (let i = 0; i < segments; i++) {
                        const doy1 = (i / segments) * DAYS_IN_YEAR;
                        const doy2 = ((i + 1) / segments) * DAYS_IN_YEAR;
                        const a1 = (doy1 / DAYS_IN_YEAR) * TAU - HALF_PI;
                        const a2 = (doy2 / DAYS_IN_YEAR) * TAU - HALF_PI;

                        const hours = 12 + amplitude * Math.sin((doy1 - 80) * TAU / DAYS_IN_YEAR);
                        const normalizedW = (hours / 16) * w;

                        const isNear = Math.abs(doy1 - dayOfYear) < (DAYS_IN_YEAR / segments);
                        ctx.beginPath();
                        ctx.arc(0, 0, r, a1, a2 + 0.02);
                        ctx.strokeStyle = getRingColor(ring, theme);
                        ctx.globalAlpha = isNear ? 0.9 : 0.4;
                        ctx.lineWidth = normalizedW;
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1.0;
                }

                if (ring.type === 'showers') {
                    const jd = julianDate(now);
                    const currentSolLon = solarLongitude(jd);
                    meteorShowerData.forEach(shower => {
                        // Map solar longitude to angle on ring (solar lon 0° = spring equinox ≈ day 79)
                        const startA = (shower.activity[0] / 360) * TAU - HALF_PI;
                        const endA = (shower.activity[1] / 360) * TAU - HALF_PI;
                        const peakA = (shower.peakSolLon / 360) * TAU - HALF_PI;

                        const isActive = (currentSolLon >= shower.activity[0] && currentSolLon <= shower.activity[1]) ||
                            (shower.activity[0] > shower.activity[1] && (currentSolLon >= shower.activity[0] || currentSolLon <= shower.activity[1]));

                        // Activity arc
                        ctx.beginPath();
                        ctx.arc(0, 0, r, startA, endA);
                        ctx.strokeStyle = '#a855f7';
                        ctx.globalAlpha = isActive ? 0.7 : 0.15;
                        ctx.lineWidth = w;
                        ctx.stroke();

                        // Peak dot
                        ctx.beginPath();
                        ctx.arc(Math.cos(peakA) * r, Math.sin(peakA) * r, isActive ? 4 : 2, 0, TAU);
                        ctx.fillStyle = isActive ? '#c084fc' : '#a855f7';
                        ctx.globalAlpha = isActive ? 1 : 0.4;
                        ctx.fill();
                    });
                    ctx.globalAlpha = 1.0;
                }

                if (ring.type === 'planets') {
                    const jd = julianDate(now);
                    const T = (jd - 2451545.0) / 36525;
                    const sunLon = solarLongitude(jd);
                    nakedEyePlanets.forEach(p => {
                        const lon = norm(p.L + p.LR * T);
                        const a = (lon / 360) * TAU - HALF_PI;

                        // Elongation from sun determines visibility
                        let elong = Math.abs(lon - sunLon);
                        if (elong > 180) elong = 360 - elong;
                        const isVisible = elong > 15; // roughly visible when >15° from sun

                        ctx.beginPath();
                        ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 5, 0, TAU);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = isVisible ? 0.9 : 0.3;
                        ctx.fill();

                        // Planet symbol
                        ctx.font = '11px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = isVisible ? theme.textColor : theme.textDim;
                        ctx.globalAlpha = isVisible ? 0.9 : 0.3;
                        ctx.fillText(p.symbol, Math.cos(a) * r, Math.sin(a) * r - 10);
                    });
                    ctx.globalAlpha = 1.0;
                }

                ctx.restore();
            });

            // === CENTER PULSE ===
            const heartbeat = 1 - (ms / 1000);
            const centerColor = theme.centerColor;
            const style = theme.ringStyle;

            const rgb = hexToRgb(centerColor);

            if (style === 'glow' || style === 'aurora') {
                for (let i = 0; i < 3; i++) {
                    const layer = (heartbeat + i * 0.33) % 1;
                    const size = maxR * (0.03 + layer * 0.08);
                    ctx.shadowBlur = 30 * (1 - layer);
                    ctx.shadowColor = centerColor;
                    drawCircle(cx, cy, size, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${(1 - layer) * 0.6})`);
                }
                resetShadow();
            } else if (style === 'beveled') {
                const baseSize = maxR * 0.05;
                drawCircle(cx, cy, baseSize + 2, 'rgba(0,0,0,0.5)');
                const gradient = ctx.createRadialGradient(cx - baseSize * 0.3, cy - baseSize * 0.3, 0, cx, cy, baseSize);
                gradient.addColorStop(0, `rgba(${rgb.r + 40}, ${rgb.g + 40}, ${rgb.b + 40}, 1)`);
                gradient.addColorStop(0.7, centerColor);
                gradient.addColorStop(1, `rgba(${Math.max(0, rgb.r - 40)}, ${Math.max(0, rgb.g - 40)}, ${Math.max(0, rgb.b - 40)}, 1)`);
                drawCircle(cx, cy, baseSize, gradient);
                if (theme.glowEnabled) {
                    ctx.shadowBlur = 15 * heartbeat;
                    ctx.shadowColor = centerColor;
                }
                drawCircle(cx, cy, baseSize * (1 + heartbeat * 0.3), null, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${heartbeat * 0.4})`, 3);
                resetShadow();
            } else if (style === 'cockpit') {
                const baseSize = maxR * 0.04;
                for (let i = 0; i < 4; i++) {
                    drawCircle(cx, cy, baseSize + i * 4, null, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${(1 - i * 0.2) * heartbeat * 0.8})`, 2);
                }
                ctx.shadowBlur = 20;
                ctx.shadowColor = centerColor;
                drawCircle(cx, cy, baseSize * 0.6, centerColor);
                resetShadow();
                ctx.globalAlpha = 0.3 * heartbeat;
                ctx.fillStyle = centerColor;
                ctx.fillRect(cx - baseSize * 2, cy - 1 + (heartbeat * 8), baseSize * 4, 2);
                ctx.globalAlpha = 1.0;
            } else if (style === 'neumorphic' || style === 'neumorphic-dark') {
                const baseSize = maxR * 0.045;
                ctx.shadowBlur = 6;
                ctx.shadowColor = theme.neuDarkShadow;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                drawCircle(cx, cy, baseSize + 3, theme.neuDarkShadow);
                resetShadow();
                const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseSize);
                gradient.addColorStop(0, centerColor);
                gradient.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${0.4 + heartbeat * 0.6})`);
                drawCircle(cx, cy, baseSize, gradient);
            } else if (style === 'flat' || style === 'bold') {
                const baseSize = maxR * 0.035;
                drawCircle(cx, cy, baseSize * (1.5 + heartbeat * 0.5), null, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${heartbeat * 0.6})`, style === 'bold' ? 4 : 2);
                drawCircle(cx, cy, baseSize, centerColor);
            } else if (style === 'soft') {
                const baseSize = maxR * 0.04;
                ctx.shadowBlur = 12 * heartbeat;
                ctx.shadowColor = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.6)`;
                drawCircle(cx, cy, baseSize, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${0.4 + heartbeat * 0.4})`);
                resetShadow();
            } else {
                const baseSize = maxR * 0.04;
                if (theme.glowEnabled) {
                    ctx.shadowBlur = 20 * heartbeat;
                    ctx.shadowColor = centerColor;
                }
                drawCircle(cx, cy, baseSize, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${0.3 + heartbeat * 0.5})`);
                resetShadow();
            }

            // Swiss Railway second hand
            if (theme.secondHand) {
                const secAngle = (sec / 60) * TAU - HALF_PI;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(secAngle);
                // Second hand line
                ctx.beginPath();
                ctx.moveTo(0, maxR * 0.05);
                ctx.lineTo(0, -maxR * 0.7);
                ctx.strokeStyle = theme.centerColor;
                ctx.lineWidth = 3;
                ctx.stroke();
                // Lollipop end
                ctx.beginPath();
                ctx.arc(0, -maxR * 0.65, 8, 0, TAU);
                ctx.fillStyle = theme.centerColor;
                ctx.fill();
                ctx.restore();
            }

            if (interactionPos) {
                const dx = interactionPos.x - cx; const dy = interactionPos.y - cy;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const screenAngle = Math.atan2(dy, dx) + HALF_PI;
                let normScreenAngle = screenAngle < 0 ? screenAngle + TAU : screenAngle;
                hoveredRingId = null; hoveredSegmentIdx = null;
                rings.forEach(ring => {
                    const r = ring.r * maxR;
                    if (Math.abs(dist - r) < ring.w + 10) {
                        hoveredRingId = ring.id;
                        const rv = getRingValue(ring, now, minProgress, hrProgress, yearProgress, dayOfYear);
                        let rot = ring.static ? 0 : -rv * TAU;
                        let dataA = normScreenAngle - rot;
                        while (dataA < 0) dataA += TAU; while (dataA > TAU) dataA -= TAU;
                        hoveredSegmentIdx = Math.floor((dataA / (TAU)) * ring.divisions);
                        showTooltipContent(ring, hoveredSegmentIdx, interactionPos.x, interactionPos.y, dataA);
                    }
                });
                if (!hoveredRingId) hideTooltip();
            }
            requestAnimationFrame(draw);
        }

        // === INTERACTION / TOOLTIP ===
        function showTooltipContent(ring, idx, x, y, dataA) {
            tooltip.style.display = 'block';
            if (!isMobile) { tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px'; }
            let title = ring.id.toUpperCase(); let body = `Index: ${idx + 1}`;
            if (ring.id === 'month' && ring.labels[idx]) { title = "MONTH"; body = ring.labels[idx]; }
            else if (ring.id === 'wday' && ring.labels[idx]) { title = "WEEKDAY"; body = ring.labels[idx]; }
            else if (ring.type === 'zodiac') {
                const dayFromA = (dataA / TAU) * DAYS_IN_YEAR;
                const sign = zodiacData.find((s,i) => {
                    const next = zodiacData[i+1] ? zodiacData[i+1].start : DAYS_IN_YEAR + zodiacData[0].start;
                    return (dayFromA >= s.start && dayFromA < next) || (s.name === "Capricorn" && (dayFromA >= 356 || dayFromA < 20));
                }) || zodiacData[0];
                title = "ZODIAC"; body = sign.name;
            } else if (ring.type === 'lunar') {
                const p = ["New Moon", "Waxing Crescent", "First Quarter", "Waxing Gibbous", "Full Moon", "Waning Gibbous", "Last Quarter", "Waning Crescent"];
                title = "LUNAR PHASE"; body = p[Math.floor((dataA / (TAU)) * 8) % 8];
            } else if (ring.type === 'events') {
                const dCheck = (dataA / TAU) * DAYS_IN_YEAR;
                let closest = null; let minD = 3;
                allEvents.forEach(ev => {
                    const ed = (ev.date - YEAR_BASE) / MS_PER_DAY;
                    let d = Math.abs(ed - dCheck); if (d > 300) d = DAYS_IN_YEAR - d;
                    if (d < minD) { minD = d; closest = ev; }
                });
                if (closest) {
                    const typeColor = eventColors[closest.type] || '#3b82f6';
                    title = closest.name;
                    body = `Date: ${closest.date.toLocaleDateString()}<br>Type: <span style="color:${typeColor}">${closest.type.toUpperCase()}</span>`;
                }
                else { title = "EVENTS"; body = "Hover markers for 2026 milestones"; }
            } else if (ring.id === 'week') {
                title = "WEEK"; body = `Week ${idx + 1} of 52`;
            } else if (ring.type === 'seasons') {
                const dayFromA = (dataA / TAU) * DAYS_IN_YEAR;
                const season = seasonData.find(s => dayFromA >= s.start && dayFromA < s.end) || seasonData[0];
                const progress = ((dayFromA - season.start) / (season.end - season.start) * 100).toFixed(0);
                title = "SEASON"; body = `<span style="color:${season.color}">${season.name}</span> (${progress}% complete)`;
            } else if (ring.type === 'daylight') {
                const dayFromA = (dataA / TAU) * DAYS_IN_YEAR;
                const hours = 12 + 2.7 * Math.sin((dayFromA - 80) * TAU / DAYS_IN_YEAR);
                const h = Math.floor(hours);
                const m = Math.round((hours - h) * 60);
                title = "DAYLIGHT"; body = `~${h}h ${m}m of daylight<br><span style="opacity:0.6">Model: 40°N latitude</span>`;
            } else if (ring.type === 'showers') {
                const solLonFromA = (dataA / TAU) * 360;
                let closest = null; let minD = 15;
                meteorShowerData.forEach(s => {
                    let d = Math.abs(s.peakSolLon - solLonFromA);
                    if (d > 180) d = 360 - d;
                    if (d < minD) { minD = d; closest = s; }
                });
                if (closest) {
                    title = "METEOR SHOWER";
                    body = `${closest.name}<br>ZHR: ~${closest.zhr} meteors/hr`;
                } else {
                    title = "METEOR SHOWERS"; body = "Hover peak markers for shower info";
                }
            } else if (ring.type === 'planets') {
                const lonFromA = (dataA / TAU) * 360;
                let closest = null; let minD = 15;
                const jd = julianDate(new Date());
                const T = (jd - 2451545.0) / 36525;
                nakedEyePlanets.forEach(p => {
                    const pLon = norm(p.L + p.LR * T);
                    let d = Math.abs(pLon - lonFromA);
                    if (d > 180) d = 360 - d;
                    if (d < minD) { minD = d; closest = { ...p, lon: pLon }; }
                });
                if (closest) {
                    title = `${closest.symbol} ${closest.name.toUpperCase()}`;
                    body = `Ecliptic longitude: ${closest.lon.toFixed(1)}°`;
                } else {
                    title = "PLANETS"; body = "Naked-eye planet positions";
                }
            } else if (ring.id === 'hr') { title = "HOUR"; body = `${idx}:00`; }
            else if (ring.id === 'min') { title = "MINUTE"; body = `${idx}`; }
            tooltip.innerHTML = `<h3>${title}</h3><div class="content">${body}</div>`;
        }

        function hideTooltip() { tooltip.style.display = 'none'; hoveredRingId = null; hoveredSegmentIdx = null; }
        function setPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx_ = e.touches ? e.touches[0].clientX : e.clientX;
            const cy_ = e.touches ? e.touches[0].clientY : e.clientY;
            interactionPos = { x: cx_ - rect.left, y: cy_ - rect.top };
        }
        // === EVENT LISTENERS ===
        canvas.addEventListener('mousemove', setPos);
        canvas.addEventListener('touchstart', e => setPos(e));
        canvas.addEventListener('touchmove', e => { e.preventDefault(); setPos(e); }, {passive: false});
        canvas.addEventListener('touchend', hideTooltip);
        canvas.addEventListener('mouseleave', hideTooltip);
        requestAnimationFrame(draw);

        const infoIcon = document.getElementById('infoIcon');
        const infoPopup = document.getElementById('infoPopup');
        infoIcon.addEventListener('click', (e) => { e.preventDefault(); infoPopup.classList.toggle('visible'); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { infoPopup.classList.remove('visible'); hideTooltip(); } });
    </script>
